<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrowsidianW</title>
  <link rel="icon" type="image/png" href="/img/browsidian.png" />
  <link rel="apple-touch-icon" href="/img/browsidian.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="brand-title">
            <img class="brand-logo" src="/img/browsidian.png" alt="" aria-hidden="true" />
            <span>BrowsidianW</span>
          </div>
          <div class="brand-subtitle vault-header">

            <p class="marquee"><span id="vaultName" class="vault-name"></span></p>

            <div class="vault-actions" aria-label="Vault actions">
              <button id="selectVaultBtn" class="icon-btn" title="Change vault" aria-label="Change vault">
                <svg class="icon-svg" aria-hidden="true">
                  <use href="#i-folder"></use>
                </svg>
                <span class="icon-btn-label">Change</span>
              </button>
              <button id="useServerBtn" class="icon-btn" title="Disconnect" aria-label="Disconnect" hidden>
                <svg class="icon-svg" aria-hidden="true">
                  <use href="#i-log-out"></use>
                </svg>
                <span class="icon-btn-label">Disconnect</span>
              </button>
            </div>


          </div>
        </div>
        <input id="search" class="search" placeholder="Search files…" autocomplete="off" hidden />
        <div id="createActions" class="actions" hidden>
          <button id="newFileBtn" class="btn btn-secondary">
            <svg class="icon-svg" aria-hidden="true">
              <use href="#i-plus"></use>
            </svg>
            <span>New file</span>
          </button>
          <button id="newFolderBtn" class="btn btn-secondary">
            <svg class="icon-svg" aria-hidden="true">
              <use href="#i-folder"></use>
            </svg>
            <span>New folder</span>
          </button>
        </div>
      </div>



      <div id="tree" class="tree" role="tree" aria-label="Files"></div>
    </aside>


    <main class="main">
      <header class="topbar">
        <div class="topbar-actions">
          <button id="toggleSidebarBtn" class="btn btn-secondary toggle-sidebar-btn" title="Toggle sidebar"
            aria-pressed="false">
            <svg class="icon-svg" aria-hidden="true">
              <use href="#i-side"></use>
            </svg>
          </button>
        </div>
        <div class="path">
          <span class="path-label">File:</span>
          <span id="currentPath" class="path-value">—</span>
          <span id="dirty" class="dirty" title="Unsaved changes" hidden>●</span>
        </div>
        <div class="topbar-actions">
          <button id="sourceModeBtn" class="btn btn-secondary" title="Show source mode" aria-pressed="false">
            <svg class="icon-svg" aria-hidden="true">
              <use href="#i-code"></use>
            </svg>
            <span>Source</span>
          </button>
          <button id="lineNumbersBtn" class="btn btn-secondary" title="Show line numbers" aria-pressed="false">
            <svg class="icon-svg" aria-hidden="true">
              <use href="#i-line-numbers"></use>
            </svg>
            <span>Line numbers</span>
          </button>
          <button id="saveBtn" class="btn btn-primary" disabled>
            <svg class="icon-svg" aria-hidden="true">
              <use href="#i-save"></use>
            </svg>
            <span>Save (Ctrl+S)</span>
          </button>
        </div>
      </header>

      <section class="editor">
        <div id="preview" class="preview" tabindex="0" role="button" aria-label="Preview (click to edit)"></div>
        <textarea id="editor" class="textarea" spellcheck="false" placeholder="Select a file on the left…"
          hidden></textarea>
      </section>

      <footer class="statusbar">

        <div id="status" class="status">Ready.</div>
        <div id="saveStatus" class="status">Saved.</div>

        <div class="status-right">
          <div class="meta">
            <span id="appVersion" class="meta-item" title="Version">v—</span>
            <span class="meta-sep">•</span>
            <a class="meta-item" href="https://lamouche.fr" target="_blank" rel="noreferrer noopener">Cooked with <span
                class="accent-heart" aria-hidden="true">♥</span> by Benoit (& Witnull)</a>
            <span class="meta-sep">•</span>
            <a class="meta-item" href="https://github.com/blamouche/obsidian-web" target="_blank"
              rel="noreferrer noopener">
              <svg class="icon-svg meta-icon" aria-hidden="true">
                <use href="#i-github"></use>
              </svg>
              <span>GitHub</span>
            </a>
          </div>
          <span class="meta-sep" aria-hidden="true">•</span>
          <label class="toggle" title="Dark / Light mode">
            <input id="themeToggle" type="checkbox" />
            <span class="toggle-track" aria-hidden="true"></span>
            <span class="toggle-side toggle-side-left">
              <svg class="icon-svg" aria-hidden="true">
                <use href="#i-moon"></use>
              </svg>
              <span>Dark</span>
            </span>
            <span class="toggle-side toggle-side-right">
              <svg class="icon-svg" aria-hidden="true">
                <use href="#i-sun"></use>
              </svg>
              <span>Light</span>
            </span>
          </label>
        </div>
      </footer>
    </main>
  </div>

  <dialog id="promptDialog" class="dialog">
    <form method="dialog" class="dialog-form">
      <div class="dialog-title" id="promptTitle">Title</div>
      <div class="dialog-body">
        <label class="dialog-label" for="promptInput" id="promptLabel">Label</label>
        <input id="promptInput" class="dialog-input" />
        <div class="dialog-help" id="promptHelp"></div>
      </div>
      <div class="dialog-actions">
        <button value="cancel" class="btn btn-secondary">Cancel</button>
        <button value="ok" class="btn btn-primary">OK</button>
      </div>
    </form>
  </dialog>

  <dialog id="authDialog" class="dialog">
    <form id="authForm" method="dialog" class="dialog-form">
      <div class="dialog-title" id="authTitle">Login</div>
      <div class="dialog-body">
        <div class="dialog-help" id="authHelp">Enter your account and password.</div>
        <label class="dialog-label" for="authAccount">Account</label>
        <input id="authAccount" class="dialog-input" />
        <label class="dialog-label" for="authPassword">Password</label>
        <input id="authPassword" class="dialog-input" type="password" autocomplete="current-password" />
      </div>
      <div class="dialog-actions">
        <button id="authCancel" value="cancel" class="btn btn-secondary">Cancel</button>
        <button id="authSubmit" value="ok" class="btn btn-primary">Submit</button>
      </div>
    </form>
  </dialog>

  <dialog id="vaultDialog" class="dialog">
    <form method="dialog" class="dialog-form">
      <div class="dialog-title">Open a vault</div>
      <div class="dialog-body">
        <div class="dialog-help">
          No vault is open. You can choose a local folder (recommended), or start the server with
          <code>OBSIDIAN_VAULT</code>/<code>--vault</code>.
        </div>
      </div>
      <div class="dialog-actions">
        <button id="vaultDemoBtn" type="button" class="btn btn-secondary">Try demo vault</button>
        <button id="vaultChooseBtn" type="button" class="btn btn-primary">Choose local vault</button>
      </div>
    </form>
  </dialog>

  <div id="contextMenu" class="context-menu" hidden>
    <button id="contextRenameItem" class="context-item" type="button">Rename</button>
    <button id="contextDeleteFile" class="context-item" type="button">Delete</button>
  </div>

  <div id="appOverlay" hidden>
    <div class="overlayCard">
        <h2 id="overlayTitle">Error</h2>
        <p id="overlayMsg">Something went wrong.</p>

        <div class="overlayActions">
            <button id="overlayClose">Close</button>
        </div>
    </div>
  </div>


  <script src="/modules/iconBootstrap.js" type="module"></script>
</body>

</html>
